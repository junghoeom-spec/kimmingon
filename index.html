<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴문의 - 김민곤</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <section class="contact-section">
    <h2>제휴문의</h2>
    <p class="contact-desc">협업 및 제휴 관련 문의사항을 남겨주시면 빠르게 답변드리겠습니다.</p>

    <form action="https://formspree.io/f/mojngygo" method="POST" class="contact-form">
      <div class="form-group">
        <label for="name">이름 / 회사명</label>
        <input type="text" id="name" name="name" placeholder="홍길동 / (주)예시회사" required />
      </div>

      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>

      <div class="form-group">
        <label for="phone">연락처</label>
        <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" />
      </div>

      <div class="form-group">
        <label for="inquiry-type">문의 유형</label>
        <select id="inquiry-type" name="inquiry_type" required>
          <option value="" disabled selected>선택해주세요</option>
          <option value="광고/협찬">광고 / 협찬</option>
          <option value="콘텐츠 제작">콘텐츠 제작</option>
          <option value="공동기획">공동기획</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" rows="5" placeholder="제휴 내용을 자세히 적어주세요." required></textarea>
      </div>

      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>
  </section>
</body>
</html>
